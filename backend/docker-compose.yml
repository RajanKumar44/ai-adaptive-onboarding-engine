services:

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hackathon_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hackathon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: backend-app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/hackathon_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hackathon_db
      INIT_DB: "true"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile

    container_name: frontend-app
    restart: always

    depends_on:
      - backend

    ports:
      - "3000:3000"

volumes:
  postgres_data: